name: 什么值得买自动脚本

on:
  workflow_dispatch: 

permissions:
  contents: write
  actions: write

jobs:
  run-smzdm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install crypto-js got@11 tough-cookie

      - name: Run SMZDM Scripts
        env:
          SMZDM_COOKIE: ${{ secrets.SMZDM_COOKIE }}
          SMZDM_SK: ${{ secrets.SMZDM_SK }}
          SERVER_CHAN_SEND_KEY: ${{ secrets.SERVER_CHAN_SEND_KEY }}
          SMZDM_TASK_TESTING: 'yes'
          SMZDM_CROWD_SILVER_5: 'no'
          SMZDM_COMMENT: '点赞支持，感谢分享！'
        run: |
          echo "=== 开始执行什么值得买每日签到 ==="
          node smzdm/smzdm_checkin.js
          # echo "=== 开始执行什么值得买抽奖 ==="
          # node smzdm/smzdm_lottery.js
          echo "=== 开始执行什么值得买每日任务 ==="
          node smzdm/smzdm_task.js
          echo "=== 开始执行什么值得买全民众测 ==="
          node smzdm/smzdm_testing.js
          echo "=== 发送任务汇总通知 ==="
          node smzdm/send_summary.js

          # --- 以下是新增的外挂推送步骤 ---
      - name: Run SMZDM and Capture Output
        id: run_script
        run: |
          # 运行脚本并记录所有输出到 logs.txt
          node scripts/smzdm.js > logs.txt 2>&1 || true
          cat logs.txt
          
          # 提取包含关键结果的行（过滤掉冗余代码，只看结果）
          # 匹配：成功、失败、奖、积分、碎银子、经验
          RESULT=$(grep -E "成功|失败|奖|分|银|经验" logs.txt | tail -n 15 || echo "未抓取到关键结果，请检查日志")
          
          # 处理换行符，防止飞书接口报错
          RESULT_CLEAN=$(echo "$RESULT" | sed ':a;N;$!ba;s/\n/\\n/g')
          echo "SUMMARY=$RESULT_CLEAN" >> $GITHUB_ENV
        env:
          SMZDM_COOKIE: ${{ secrets.SMZDM_COOKIE }}

      - name: Feishu Bot Notify
        if: always()
        run: |
          curl -X POST '${{ secrets.FEISHU_WEBHOOK }}' \
          -H 'Content-Type: application/json' \
          -d '{
            "msg_type": "post",
            "content": {
              "post": {
                "zh_cn": {
                  "title": "SMZDM 签到实况报告",
                  "content": [
                    [{
                      "tag": "text",
                      "text": "📋 关键结果如下：\n${{ env.SUMMARY }}"
                    }],
                    [{
                      "tag": "a",
                      "text": "➡️ 查看完整日志",
                      "href": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }]
                  ]
                }
              }
            }
          }'
