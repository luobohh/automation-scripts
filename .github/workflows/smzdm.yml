name: 什么值得买自动脚本

on:
  workflow_dispatch: 

permissions:
  contents: write
  actions: write

jobs:
  run-smzdm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install crypto-js got@11 tough-cookie

      - name: Run SMZDM Scripts
        env:
          SMZDM_COOKIE: ${{ secrets.SMZDM_COOKIE }}
          SMZDM_SK: ${{ secrets.SMZDM_SK }}
          SERVER_CHAN_SEND_KEY: ${{ secrets.SERVER_CHAN_SEND_KEY }}
          SMZDM_TASK_TESTING: 'yes'
          SMZDM_CROWD_SILVER_5: 'no'
          SMZDM_COMMENT: '点赞支持，感谢分享！'
        run: |
          echo "=== 开始执行什么值得买每日签到 ==="
          node smzdm/smzdm_checkin.js
          # echo "=== 开始执行什么值得买抽奖 ==="
          # node smzdm/smzdm_lottery.js
          echo "=== 开始执行什么值得买每日任务 ==="
          node smzdm/smzdm_task.js
          echo "=== 开始执行什么值得买全民众测 ==="
          node smzdm/smzdm_testing.js
          echo "=== 发送任务汇总通知 ==="
          node smzdm/send_summary.js

          # --- 以下是新增的外挂推送步骤 ---
      - name: Feishu Bot Notify
        if: always() # 即使签到报错也要发通知
        run: |
          curl -X POST '${{ secrets.FEISHU_WEBHOOK }}' \
          -H 'Content-Type: application/json' \
          -d '{
            "msg_type": "post",
            "content": {
              "post": {
                "zh_cn": {
                  "title": "什么值得买自动任务报告",
                  "content": [
                    [{
                      "tag": "text",
                      "text": "所有脚本已执行完毕。由于飞书不支持超长日志，具体收益请直接点击 GitHub Actions 查看结果。"
                    }],
                    [{
                      "tag": "a",
                      "text": "点击查看详细运行日志",
                      "href": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }]
                  ]
                }
              }
            }
          }'
