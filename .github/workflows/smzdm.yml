name: 什么值得买自动脚本

on:
  workflow_dispatch: 

permissions:
  contents: write
  actions: write

jobs:
  run-smzdm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install crypto-js got@11 tough-cookie

      - name: Run SMZDM Scripts
        env:
          SMZDM_COOKIE: ${{ secrets.SMZDM_COOKIE }}
          SMZDM_SK: ${{ secrets.SMZDM_SK }}
          SERVER_CHAN_SEND_KEY: ${{ secrets.SERVER_CHAN_SEND_KEY }}
          SMZDM_TASK_TESTING: 'yes'
          SMZDM_CROWD_SILVER_5: 'no'
          SMZDM_COMMENT: '点赞支持，感谢分享！'
        run: |
          echo "=== 开始执行什么值得买每日签到 ==="
          node smzdm/smzdm_checkin.js
          # echo "=== 开始执行什么值得买抽奖 ==="
          # node smzdm/smzdm_lottery.js
          echo "=== 开始执行什么值得买每日任务 ==="
          node smzdm/smzdm_task.js
          echo "=== 开始执行什么值得买全民众测 ==="
          node smzdm/smzdm_testing.js
          echo "=== 发送任务汇总通知 ==="
          node smzdm/send_summary.js

          # --- 以下是新增的外挂推送步骤 ---
      - name: PushPlus Notify (Custom)
        if: always() # 确保前面的任务报错了也能发送通知
        run: |
          curl -X POST http://www.pushplus.plus/send \
            -H "Content-Type: application/json" \
            -d '{
              "token": "${{ secrets.PUSH_PLUS_TOKEN }}",
              "title": "什么值得买全任务报告",
              "content": "脚本已运行完毕。如果 Server 酱 400 报错，请直接登录 GitHub Actions 查看 Working 步骤下的详细日志。",
              "template": "html"
            }'
